<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2035">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FichaMedición">
  <title>Ficha Técnica de Medición</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p>Cargando...</p>
    </div>
  </div>

  <div id="toast" class="toast" role="alert" aria-live="polite"></div>


  <!-- Import JSON file input (hidden) -->
  <input type="file" id="import-file" accept=".json" style="display:none">
  <!-- Photo input (hidden) -->
  <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none">

  <script src="js/libs/jspdf.umd.min.js"></script>
  <script src="js/libs/jspdf.plugin.autotable.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
